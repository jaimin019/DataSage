version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - React
  - Tailwind CSS
  - Supabase Auth
  - Zustand
  - Lucide React
  - Recharts
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Landing page
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: User login page
  - path: /signup
    file: app/signup/page.tsx
    auth_required: false
    description: User registration page
  - path: /forgot-password
    file: app/forgot-password/page.tsx
    auth_required: false
    description: Password reset request page
  - path: /history
    file: app/history/page.tsx
    auth_required: true
    description: User analysis history dashboard
  - path: /dashboard/[sessionId]
    file: app/dashboard/[sessionId]/page.tsx
    auth_required: true
    description: Analysis results dashboard for a specific session
features:
  - name: User Login
    description: Login with email/password or Google OAuth
    files:
      - app/login/page.tsx
      - store/authStore.ts
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - See error message on invalid credentials
      - Click Continue with Google
    api_calls:
      - method: POST
        endpoint: https://*.supabase.co/auth/v1/token
    auth_required: false
  - name: User Signup
    description: Register with email and password
    files:
      - app/signup/page.tsx
      - store/authStore.ts
    entry_route: /signup
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Fill confirm password input field
      - Click Sign Up button
      - View email verification message
    api_calls:
      - method: POST
        endpoint: https://*.supabase.co/auth/v1/signup
    auth_required: false
  - name: CSV Upload
    description: Upload CSV data for analysis
    files:
      - components/dashboard/UploadDropzone.tsx
      - components/dashboard/AnalysisProgress.tsx
    entry_route: /history
    user_interactions:
      - Drag and drop CSV file onto dropzone
      - Click dropzone to select file
      - See progress bar for upload and analysis
      - Get redirected to dashboard automatically upon completion
    api_calls:
      - method: POST
        endpoint: /api/v1/session/upload
    auth_required: true
  - name: Analysis History
    description: View list of previous data analysis sessions
    files:
      - app/history/page.tsx
      - components/dashboard/SessionList.tsx
    entry_route: /history
    user_interactions:
      - View list of sessions
      - Click on a session card to navigate to its dashboard
    api_calls:
      - method: GET
        endpoint: /api/v1/history
    auth_required: true
  - name: Session Dashboard
    description: View analysis results, charts, and AI insights
    files:
      - app/dashboard/[sessionId]/page.tsx
    entry_route: /dashboard/[sessionId]
    user_interactions:
      - View charts and insights
      - Click tabs (Overview, Data, AI Insights)
    api_calls:
      - method: GET
        endpoint: /api/v1/session/{sessionId}/analysis
    auth_required: true
known_limitations: []
